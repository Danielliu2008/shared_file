<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#1C1815">
<title>404</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:100%;height:100vh;height:100dvh;
  background:#1C1815;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:Georgia,'Noto Serif SC',serif;color:#D4AF37;
  overflow:hidden;
}
.envelope{
  width:min(60vw,200px);aspect-ratio:4/3;
  background:#fdfaf5;border-radius:4px;
  position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  margin-bottom:40px;opacity:0.5;
}
.envelope::before{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:repeating-linear-gradient(-45deg,#E63946 0,#E63946 10px,#fff 10px,#fff 20px,#457B9D 20px,#457B9D 30px,#fff 30px,#fff 40px);
  clip-path:polygon(0 0,100% 0,50% 100%);
}
h1{font-size:clamp(48px,12vw,80px);font-weight:400;letter-spacing:0.15em;opacity:0.7}
p{font-size:clamp(13px,3vw,16px);color:rgba(212,175,55,0.45);margin-top:12px;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="envelope"></div>
<h1>404</h1>
<p>This letter is not for you.</p>
</body>
</html>
